<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Strict CSP; data: images allowed for pack wallpapers (delivered as
       sanitized data URIs by the main process, never raw paths). -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self'; script-src 'self'; font-src 'self'; img-src 'self' data:">
  <title>AEGIS</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <header class="bar">
    <div class="brand">
      <h1 id="persona-name">AEGIS</h1>
      <p class="mono sub" id="persona-tagline"></p>
    </div>
    <div class="controls">
      <label class="visually-hidden" for="pack-select">Persona pack</label>
      <select id="pack-select" class="mono"></select>
      <button class="btn" id="btn-library">LIBRARY</button>
      <button class="btn" id="btn-panel">VOICE TUNING</button>
    </div>
  </header>

  <main class="canvas-outer" aria-label="Dashboard components">
    <div class="canvas" id="canvas"></div>

    <section class="library hidden" id="library" aria-label="Pack library">
      <header class="library-head">
        <div class="lib-tabs" role="tablist">
          <button class="tab" id="tab-installed" role="tab" aria-selected="true">INSTALLED</button>
          <button class="tab" id="tab-browse" role="tab" aria-selected="false">BROWSE</button>
        </div>
        <label class="visually-hidden" for="lib-search">Search packs</label>
        <input id="lib-search" class="mono lib-search" placeholder="search…" spellcheck="false">
        <div class="btn-row">
          <button class="btn" id="btn-install-file">INSTALL FROM FILE</button>
          <button class="btn" id="btn-library-close">CLOSE</button>
        </div>
      </header>
      <p class="mono library-status" id="library-status" role="status" aria-live="polite"></p>

      <div class="library-main">
        <div class="library-gallery">
          <div class="reg-add hidden" id="reg-add">
            <label class="visually-hidden" for="reg-url">Registry URL</label>
            <input id="reg-url" class="mono" placeholder="subscribe to a registry: https://…/index.json" spellcheck="false">
            <button class="btn" id="btn-reg-add">SUBSCRIBE</button>
          </div>
          <div class="gallery" id="gallery"></div>
        </div>
        <aside class="library-detail" id="lib-detail" aria-label="Pack details">
          <p class="lib-meta" id="detail-empty">Select a pack to see its details.</p>
        </aside>
      </div>
    </section>
  </main>

  <p class="mono foot" id="foot" role="status" aria-live="polite"></p>

  <script src="dashboard.js"></script>
</body>
</html>
