<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Strict CSP; data: images are pack wallpapers/assets delivered as
       sanitized data URIs by the main process, never raw paths. `frame-src
       demodule:` lets sandboxed `module` components load (they serve their own
       network-less policy); the page's own script-src stays locked to 'self'. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self'; script-src 'self'; font-src 'self'; img-src 'self' data:; frame-src demodule:">
  <title>Dashboard Engine</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <!-- The desktop surface: no chrome, no controls — pure persona render.
       Content navigation and selection live in the manager window. -->
  <main class="canvas-outer" aria-label="Persona dashboard">
    <div class="canvas" id="canvas"></div>
  </main>
  <script src="components.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
