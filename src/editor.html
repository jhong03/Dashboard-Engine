<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self'; script-src 'self'; font-src 'self'; img-src 'self' data:">
  <title>Editor — Dashboard Engine</title>
  <!-- Order matters: dashboard.css styles pack content (the canvas), then
       chrome.css wins the shared :root tokens for the app chrome around it.
       applySkin() re-sets pack tokens inline on the canvas's skin root. -->
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="chrome.css">
  <link rel="stylesheet" href="editor.css">
</head>
<body class="editor-body">

  <header class="ed-bar">
    <div class="ed-brand">
      <h1>Editor</h1>
      <p class="ed-sub" id="ed-base">—</p>
    </div>
    <label class="visually-hidden" for="ed-name">Pack name</label>
    <input id="ed-name" type="text" class="ed-name" maxlength="60" spellcheck="false">
    <div class="ed-actions">
      <button class="btn" id="btn-save">Save</button>
      <button class="btn primary" id="btn-save-apply">Save &amp; apply</button>
    </div>
  </header>
  <p class="status-line-app ed-status" id="ed-status" role="status" aria-live="polite"></p>

  <div class="ed-main">
    <aside class="ed-palette" aria-label="Component palette">
      <h2>Components</h2>
      <p class="hint">Drag onto the canvas, or double-click to add.</p>
      <ul id="palette"></ul>
      <button class="btn tiny" id="btn-import-image">Import image…</button>
      <p class="hint" style="margin-top:6px">Your own PNG, JPG, or WebP — saved into the pack.</p>
    </aside>

    <main class="ed-stage-outer">
      <div class="ed-stage" id="stage">
        <div class="skin-root ed-skin" id="skin">
          <div class="canvas" id="canvas"></div>
        </div>
        <div class="ed-overlay" id="overlay"></div>
      </div>
    </main>

    <aside class="ed-inspector" aria-label="Inspector">
      <div class="ed-tabs" role="tablist">
        <button class="tab" id="itab-component" aria-selected="true">Component</button>
        <button class="tab" id="itab-skin" aria-selected="false">Skin</button>
        <button class="tab" id="itab-persona" aria-selected="false">Persona</button>
      </div>
      <div class="ed-panel" id="inspector"></div>
    </aside>
  </div>

  <script src="components.js"></script>
  <script src="editor.js"></script>
</body>
</html>
